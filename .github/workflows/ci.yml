name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev,server]"

      - name: Run tests
        run: pytest tests/ -q

      - name: Build frontend
        run: |
          cd client
          npm ci
          npx tsc --noEmit
          npx vite build
