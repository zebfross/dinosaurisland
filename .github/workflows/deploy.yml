name: Deploy to A2 Hosting

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -e ".[dev,server]"

      - name: Run tests
        run: pytest tests/ -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        run: |
          cd client
          npm ci
          VITE_BASE_PATH=/dinosaurisland/ npx vite build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          printf '%s\n' \
            "Host deploy-target" \
            "  HostName ${{ secrets.SSH_HOST }}" \
            "  User ${{ secrets.SSH_USER }}" \
            "  Port ${{ secrets.SSH_PORT }}" \
            "  IdentityFile ~/.ssh/id_rsa" \
            "  StrictHostKeyChecking no" \
            "  IdentitiesOnly yes" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy to server
        run: |
          REMOTE_PATH=/home/odionfro/inceptify.com/dinosaurisland
          VENV="source /home/odionfro/virtualenv/inceptify.com/dinosaurisland/3.11/bin/activate"

          rsync -avz --delete \
            --exclude='.venv' \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            --exclude='design' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='stderr.log' \
            -e "ssh" \
            ./ deploy-target:${REMOTE_PATH}/

          ssh deploy-target "${VENV} && cd ${REMOTE_PATH} && pip install -r requirements.txt -q"
          ssh deploy-target "touch ${REMOTE_PATH}/tmp/restart.txt"

      - name: Verify deployment
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -m 15 https://inceptify.com/dinosaurisland/api/health)
          if [ "$STATUS" = "200" ]; then
            echo "Deploy successful!"
          else
            echo "Warning: Health check returned HTTP ${STATUS}"
            exit 1
          fi
