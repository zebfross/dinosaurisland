name: Deploy to A2 Hosting

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -e ".[dev,server]"

      - name: Run tests
        run: pytest tests/ -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        run: |
          cd client
          npm ci
          VITE_BASE_PATH=/dinosaurisland/ npx vite build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          REMOTE_PATH: /home/odionfro/inceptify.com/dinosaurisland
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          VENV_ACTIVATE: source /home/odionfro/virtualenv/inceptify.com/dinosaurisland/3.11/bin/activate
        run: |
          rsync -avz --delete \
            --exclude='.venv' \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            --exclude='design' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='stderr.log' \
            -e "ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT }}" \
            ./ ${REMOTE_USER}@${REMOTE_HOST}:${REMOTE_PATH}/

          ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT }} ${REMOTE_USER}@${REMOTE_HOST} \
            "${VENV_ACTIVATE} && cd ${REMOTE_PATH} && pip install -r requirements.txt -q"

          ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT }} ${REMOTE_USER}@${REMOTE_HOST} \
            "touch ${REMOTE_PATH}/tmp/restart.txt"

      - name: Verify deployment
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -m 15 https://inceptify.com/dinosaurisland/api/health)
          if [ "$STATUS" = "200" ]; then
            echo "Deploy successful!"
          else
            echo "Warning: Health check returned HTTP ${STATUS}"
            exit 1
          fi
